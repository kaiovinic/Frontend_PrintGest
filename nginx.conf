# Redirect HTTP to HTTPS for all domains
server {
    listen 80;
    server_name printimpressoes.com.br www.printimpressoes.com.br printgest.printimpressoes.com.br;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - PrintGest (Management System)
server {
    listen 443 ssl;
    server_name printgest.printimpressoes.com.br;

    ssl_certificate /etc/letsencrypt/live/printimpressoes.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/printimpressoes.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_cache_bypass;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS - Landing Page (Institutional Site)
server {
    listen 443 ssl;
    server_name printimpressoes.com.br www.printimpressoes.com.br;

    ssl_certificate /etc/letsencrypt/live/printimpressoes.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/printimpressoes.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/landing;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
